name: broken links?
'on':
  push:
    branches:
      - "**"
  schedule:
    - cron: 0 16 * * *
  workflow_dispatch:  
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          fail: true
